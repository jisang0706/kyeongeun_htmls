<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학습 HTML 목록</title>
<style>
  :root {
    --bg: #f7f8fa;
    --panel: #ffffff;
    --text: #16191f;
    --muted: #667085;
    --line: #d8dee8;
    --primary: #1f6feb;
    --primary-dark: #174ea6;
    --tag-bg: #eef4ff;
    --tag-text: #315a9c;
    --shadow: 0 16px 45px -32px rgba(22, 25, 31, 0.45);
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    line-height: 1.6;
  }

  .page {
    width: min(960px, calc(100% - 32px));
    margin: 0 auto;
    padding: 44px 0 72px;
  }

  .masthead {
    display: flex;
    justify-content: space-between;
    gap: 24px;
    align-items: end;
    border-bottom: 1px solid var(--line);
    padding-bottom: 22px;
    margin-bottom: 28px;
  }

  h1 {
    margin: 0;
    font-size: clamp(28px, 5vw, 42px);
    line-height: 1.16;
    font-weight: 760;
  }

  .summary {
    margin: 8px 0 0;
    color: var(--muted);
    font-size: 15px;
  }

  .count {
    flex: 0 0 auto;
    color: var(--muted);
    font-size: 14px;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 12px;
    background: var(--panel);
  }

  .list {
    display: grid;
    gap: 14px;
  }

  .item {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 18px;
    align-items: center;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 20px;
    box-shadow: var(--shadow);
  }

  .item h2 {
    margin: 0;
    font-size: 20px;
    line-height: 1.35;
    font-weight: 720;
  }

  .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    min-height: 28px;
    border-radius: 999px;
    background: var(--tag-bg);
    color: var(--tag-text);
    padding: 4px 10px;
    font-size: 13px;
    font-weight: 650;
  }

  .description {
    margin: 12px 0 0;
    color: var(--muted);
    font-size: 15px;
  }

  .open-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 96px;
    min-height: 42px;
    border-radius: 6px;
    background: var(--primary);
    color: #ffffff;
    text-decoration: none;
    font-weight: 720;
    font-size: 15px;
  }

  .open-link:hover,
  .open-link:focus {
    background: var(--primary-dark);
  }

  .open-link:focus-visible {
    outline: 3px solid rgba(31, 111, 235, 0.28);
    outline-offset: 3px;
  }

  @media (max-width: 640px) {
    .page {
      width: min(100% - 24px, 960px);
      padding-top: 28px;
    }

    .masthead {
      display: block;
    }

    .count {
      display: inline-flex;
      margin-top: 16px;
    }

    .item {
      grid-template-columns: 1fr;
      padding: 18px;
    }

    .open-link {
      width: 100%;
    }
  }
</style>
</head>
<body>
  <main class="page">
    <header class="masthead">
      <div>
        <h1>학습 HTML 목록</h1>
        <p class="summary">저장소에 올린 학습 페이지를 한 곳에서 열 수 있습니다.</p>
      </div>
      <div class="count">총 1개</div>
    </header>

    <section class="list" aria-label="학습 페이지 목록">
      <article class="item">
        <div>
          <h2>문학 용어 단답형 퀴즈</h2>
          <div class="meta" aria-label="페이지 정보">
            <span class="tag">문학 용어</span>
            <span class="tag">단답형</span>
            <span class="tag">기말고사 대비</span>
          </div>
          <p class="description">정의를 읽고 한국어 또는 영어 문학 용어를 입력해 채점하는 퀴즈 페이지입니다.</p>
        </div>
        <a class="open-link" href="./literary-terms-short-answer-quiz.html">열기</a>
      </article>
    </section>
  </main>
</body>
</html>
